<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   
    <style>

@media (max-width: 821px) {
    .hero-image{
        width: 18rem;
    }
    .hello{
        width: 20rem;
        margin-top: 1rem;
    }

    .service-card{
        width: 20rem;
    }

    .section-four{
        gap:.5rem;
    }
          
}


@media (max-width: 600px) {
    p{
        font-size: .9rem;}  
    h1{
        font-size: 1.3rem;}
    h2{
        font-size: 1.2rem;
        color: black;}
    h3{
        font-size: 1.1rem;}
    h4{
        font-size: 0.7rem;
        color: black}

    .nav-links a{
        width: 4rem;
        font-size: 0.8rem;
    }
    .nav-links{
        gap: .2rem; 
    }
    
    .hero-section{
        background-color: white;
    }
    .hero-image{
        width: 14rem;
    }
    
    .hello{
        width: 10rem;
        margin-top: 1rem;
    }
    .hello a{
        padding: 0.3rem;
        font-size: .6rem;
    }

    .section-three{
        background-color: white;
    }
    .about-section .div{
        width: 32rem;
    }

    #card-one{
        height: 17rem;
        width: 13rem;
    }

    .skill-icon{
        width: 5rem;
        display: flex;
        justify-content: left;
        height: 1.7rem;        
        font-size: .8rem;
    }
    
    .skill-icon img{
        width: 1rem;
        height: 1rem;
    }

    #card-two{
        margin-top: 5rem;
        height: 19rem;
    }

    th, td{
        font-size: .9rem;
    }
    
    .about-image{
        width: 24rem;
        background: white;
        border: 0.1rem solid black;
        border-radius: 3rem;
    }
    .section-four-box1{
        width: 18rem;
        height: 7rem;
        gap: 0.3rem;
    }
    
    .section-four{
        gap: 0.5rem;
    }
    .section-four-box2{
        justify-content: center;
    }
    
    .section-four-box2 a{
        padding: .2rem .6rem;
        font-size: 0.6rem;
    }

    .footer{
        background: white;
    }
}


@media (max-width: 431px){
    p{
        font-size: .8rem;}  
    h1{
        font-size: 1.2rem;}
    h2{
        font-size: 1.2rem;}
    h3{
        font-size: 1.1rem;}
    h4{
        font-size: 0.8rem;
        color: white;}
    
    .nav-logo{
        font-size: 2.5rem;
    }
    .nav-logo span{
        font-size: 3rem;
    }
    .nav-links{
        flex-direction: column;
        gap: 0.1rem;
        margin: 0.5rem;  
    }
    
    .nav-links a{
        width: 5rem;
        font-size: 0.8rem;
    }

    .hero-section{
        gap:0rem;
        padding-top: 0.7rem;
    }
    .hero-image{
        width: 10rem;
    }
    
    .hello{
        width: 10rem;
    }
    
    .hello a{
        padding: 0.3rem;
        font-size: .5rem;
    }

    .about-section .div{
        width: 19rem;
    }
    
    #card-one{
        height: 17rem;
    }
    .skill-icon{
        display: flex;
        justify-content: center;
        height: 1.7rem;        
        font-size: .6rem;
    }
    /*;;;;;;;;;;;;;;;;;;;;;*/
    .skill-icon img{
        width: 1rem;
        height: 1rem;
    }

    #second-child{
        flex-direction:row;
    }
    
    
    .about-image{
        width: 17rem;
        border: 0.1rem solid black;
        border-radius: 3rem;
    }
    .socials{
        width: 2.2rem;
        height: 13rem;
        flex-direction: column;
    }
    .socials img{
        width: 2rem;
    }

    .section-three{
        flex-direction: column;
    }

    .section-four-box1{
        width: 18rem;
        height: 7rem;
        gap: 0.3rem;
    }
    
    .section-four{
        gap:1rem;
    }
    .section-four-box2{
        justify-content: center;
    }
    
    .section-four-box2 a{
        padding: .5rem;
        font-size: 0.6rem;
    }

    .footer{
        height: 10rem;
        gap:1rem;
        background: black;
        flex-direction: column;
    }

}
